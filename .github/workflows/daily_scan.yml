name: Daily Polymarket Scan

on:
  schedule:
    # רץ בכל יום בחצות (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # מאפשר לך להריץ ידנית בלחיצת כפתור

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/experimental/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests pandas

      - name: Run Polymarket Script
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add daily_winners.csv
          git commit -m "Update daily leaderboard $(date)" || exit 0
          git push
