name: Daily Polymarket Scan

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # זה חשוב כדי לוודא שאנחנו מושכים את כל ההיסטוריה
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run Polymarket Script
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # מוודאים שאנחנו מסונכרנים עם מה שיש ב-Repo
          git pull origin main
          
          # מוסיפים את הקובץ (עכשיו הוא בטוח קיים כי יצרת אותו ידנית)
          git add daily_winners.csv
          
          # מבצעים קומיט רק אם באמת השתנה משהו בנתונים
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "Update daily leaderboard $(date)"
            git push origin main
          fi
